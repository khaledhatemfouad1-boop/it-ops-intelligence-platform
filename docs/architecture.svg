  <rect x="855" y="470" width="210" height="40" rx="6" fill="#fff" stroke="#9C27B0"/>
  <text x="960" y="489" text-anchor="middle" font-size="10" font-weight="700" fill="#4A148C">🎫 Service Desk</text>
