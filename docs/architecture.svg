  <text x="697" y="162" text-anchor="middle" font-size="9" fill="#555">scheduled / on-demand</text>

  <!-- Legend -->
  <rect x="20" y="660" width="1060" height="45" rx="6" fill="#fff" stroke="#ddd"/>
