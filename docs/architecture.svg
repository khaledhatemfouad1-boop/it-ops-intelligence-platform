  <rect x="410" y="664" width="14" height="14" rx="3" fill="#C8E6C9" stroke="#388E3C"/>
  <text x="430" y="678" font-size="10" fill="#555">PostgreSQL table/view</text>
  <text x="575" y="678" font-size="10" fill="#666">✅ = live in production</text>
  <text x="700" y="678" font-size="10" fill="#666">Join key: canonical_email (lowercase) across all tables</text>

  <text x="35" y="698" font-size="10" fill="#555">Stack: Python 3.11 · Redpanda · PostgreSQL 15 · Docker · Power BI · ldap3 · confluent-kafka · psycopg2 · openpyxl · requests</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
