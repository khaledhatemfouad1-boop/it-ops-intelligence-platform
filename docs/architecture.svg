  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#666">Real-time data pipeline: 7 sources → Kafka → PostgreSQL → Power BI</text>

  <!-- ══ LAYER 1: DATA SOURCES ══ -->
  <rect x="20" y="75" width="175" height="570" rx="10" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="107" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">DATA SOURCES</text>

  <!-- Source boxes -->
  <!-- Dynamics 365 -->
  <rect x="35" y="108" width="145" height="58" rx="8" fill="#fff" stroke="#0078D4" stroke-width="1.5"/>
